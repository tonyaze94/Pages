<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestão de Ativos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--border:#333;--border2:#444;--text:#f0f0f0;--text2:#999;--text3:#666;--green:#4ade80;--green-bg:rgba(74,222,128,0.1);--red:#f87171;--red-bg:rgba(248,113,113,0.1);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.1);--amber:#fbbf24;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px;}

.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.login-logo{font-size:44px;margin-bottom:1.5rem;}
.login-title{font-size:24px;font-weight:600;margin-bottom:.35rem;text-align:center;}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:2rem;text-align:center;}
.login-card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;}
.login-error{background:var(--red-bg);border:1px solid var(--red);color:var(--red);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:1rem;display:none;}

.header{padding:1.25rem 1rem .75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--border);}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;}
.header h1{font-size:17px;font-weight:600;}
.header-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 6px;cursor:pointer;font-size:12px;color:var(--text2);}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:500;}
.nav-item.active{color:var(--green);}
.nav-icon{font-size:20px;line-height:1;}

.screen{display:none;padding:1rem;}
.screen.active{display:block;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.5rem;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.stat-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-val.green{color:var(--green);}.stat-val.red{color:var(--red);}.stat-val.blue{color:var(--blue);}.stat-val.amber{color:var(--amber);}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .5rem;}

.grupo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;cursor:pointer;}
.grupo-card:active{border-color:var(--green);}
.grupo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.grupo-nome{font-size:16px;font-weight:600;}
.grupo-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;background:var(--bg3);color:var(--text2);}
.grupo-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.grupo-stat{background:var(--bg3);border-radius:var(--radius-sm);padding:8px;text-align:center;}
.grupo-stat-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}
.grupo-stat-label{font-size:10px;color:var(--text2);margin-top:1px;}

.ativo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;cursor:pointer;}
.ativo-card:active{border-color:var(--blue);}
.ativo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ativo-nome{font-size:15px;font-weight:600;}
.ativo-estado{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;}
.ativo-estado.em_carteira{background:var(--blue-bg);color:var(--blue);}
.ativo-estado.vendido{background:var(--green-bg);color:var(--green);}
.ativo-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.ativo-num{background:var(--bg3);border-radius:var(--radius-sm);padding:8px;text-align:center;}
.ativo-num-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.ativo-num-label{font-size:10px;color:var(--text2);margin-top:1px;}

.mov-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.5rem;}
.mov-top{display:flex;align-items:flex-start;justify-content:space-between;}
.mov-left{flex:1;min-width:0;}
.mov-cat{font-size:13px;font-weight:500;}
.mov-desc{font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mov-date{font-size:11px;color:var(--text3);margin-top:2px;}
.mov-right{text-align:right;flex-shrink:0;margin-left:12px;}
.mov-val-total{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;}
.mov-val-total.custo{color:var(--red);}.mov-val-total.receita{color:var(--green);}
.mov-val-proprio{font-size:11px;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace;}
.mov-del{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 0 0 8px;line-height:1;}
.mov-parceiros{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;}
.parceiro-pill{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--bg4);color:var(--text2);font-family:'DM Mono',monospace;}

.form-group{margin-bottom:.85rem;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 13px;font-size:15px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--green);}
.form-select option{background:var(--bg3);}
.form-textarea{resize:none;height:60px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.85rem;}
.tipo-btn{padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.tipo-btn.active-custo{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.tipo-btn.active-receita{background:var(--green-bg);border-color:var(--green);color:var(--green);}

.divisao-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem;margin-bottom:.85rem;}
.divisao-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.divisao-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.btn-sm{padding:6px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg4);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;}
.proprio-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.proprio-label{font-size:14px;font-weight:500;}
.proprio-input{width:110px;padding:8px 10px;font-size:14px;background:var(--bg4);border:1px solid var(--green);border-radius:var(--radius-sm);color:var(--green);font-family:'DM Mono',monospace;text-align:right;}
.proprio-input:focus{outline:none;}
.part-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.part-nome{font-size:13px;color:var(--text);flex:1;}
.part-input{width:110px;padding:8px 10px;font-size:14px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Mono',monospace;text-align:right;}
.part-input:focus{outline:none;border-color:var(--blue);}
.part-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 0 0 8px;line-height:1;}
.diff-bar{margin-top:10px;padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;text-align:center;font-family:'DM Mono',monospace;}
.diff-ok{background:var(--green-bg);color:var(--green);}
.diff-err{background:var(--red-bg);color:var(--red);}

.btn{width:100%;padding:13px;font-size:15px;font-weight:600;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-green{background:var(--green);color:#000;}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;padding:1.25rem;max-height:92vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1rem;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:1.25rem;}

.resumo-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.resumo-row:last-child{border-bottom:none;}
.resumo-label{font-size:13px;color:var(--text2);}
.resumo-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}

.empty{text-align:center;padding:3rem 1rem;}
.empty-icon{font-size:40px;margin-bottom:.75rem;}
.empty-text{color:var(--text2);font-size:14px;line-height:1.6;}
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}
.dot-anim::after{content:'';animation:dots 1.2s infinite;}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;}
.resultado-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.resultado-badge.positivo{background:var(--green-bg);color:var(--green);}
.resultado-badge.negativo{background:var(--red-bg);color:var(--red);}
.resultado-badge.neutro{background:var(--bg3);color:var(--text2);}
.analise-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.analise-row:last-child{border-bottom:none;}
.analise-label{font-size:13px;color:var(--text2);}
.analise-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">🏦</div>
    <div class="login-title">Gestão de Ativos</div>
    <div class="login-sub">Entra na tua conta para continuar</div>
    <div class="login-card">
      <div class="login-error" id="login-error"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="login-email" placeholder="o-teu@email.com" autocomplete="email"></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-green" id="login-btn" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none;">

  <div id="screen-dashboard" class="screen active">
    <div class="header">
      <div class="header-left"><div><h1>Gestão de Ativos</h1></div></div>
      <div class="user-pill" onclick="doLogout()"><div class="user-dot"></div><span id="user-label">sair</span></div>
    </div>
    <div style="padding:1rem;">
      <div id="dash-stats" class="stats-grid"></div>
      <div class="section-title">Grupos</div>
      <div id="dash-grupos"></div>
    </div>
  </div>

  <div id="screen-ativos" class="screen">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div><h1 id="ativos-titulo">Ativos</h1><div class="header-sub" id="ativos-sub"></div></div>
      </div>
      <button class="icon-btn" onclick="openModalNovoAtivo()">+</button>
    </div>
    <div style="padding:1rem;">
      <div id="ativos-stats" class="stats-grid"></div>
      <div class="section-title">Ativos</div>
      <div id="ativos-lista"></div>
    </div>
  </div>

  <div id="screen-ativo" class="screen">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="goBack()">‹</button>
        <div><h1 id="ativo-titulo">Ativo</h1><div class="header-sub" id="ativo-sub"></div></div>
      </div>
      <button class="icon-btn" onclick="openModal('modal-opcoes')">⋯</button>
    </div>
    <div style="padding:1rem;">
      <div id="ativo-resumo"></div>
      <div style="display:flex;gap:8px;margin-bottom:.75rem;">
        <button class="btn btn-red" style="flex:1;padding:10px;" onclick="openModalMovimento('custo')">− Custo</button>
        <button class="btn" style="flex:1;padding:10px;background:var(--green-bg);color:var(--green);border:1px solid var(--green);" onclick="openModalMovimento('receita')">+ Receita</button>
      </div>
      <div class="section-title">Movimentos</div>
      <div id="ativo-movimentos"></div>
    </div>
  </div>

  <div id="screen-analise" class="screen">
    <div class="header"><div class="header-left"><div><h1>Análise</h1></div></div></div>
    <div style="padding:1rem;" id="analise-content"></div>
  </div>

  <div id="screen-config" class="screen">
    <div class="header"><div class="header-left"><div><h1>Configurações</h1></div></div></div>
    <div style="padding:1rem;">
      <div class="section-title">Grupos</div>
      <div id="config-grupos"></div>
      <button class="btn btn-secondary" onclick="openModalNovoGrupo()" style="margin-bottom:1rem;">+ Novo grupo</button>
      <div class="section-title">Parceiros</div>
      <div id="config-parceiros"></div>
      <button class="btn btn-secondary" onclick="openModalNovoParceiro()" style="margin-bottom:1rem;">+ Novo parceiro</button>
      <div class="section-title">Categorias</div>
      <div id="config-categorias"></div>
      <button class="btn btn-secondary" onclick="openModalNovaCategoria()">+ Nova categoria</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="dashboard" onclick="navigate('dashboard',this)"><span class="nav-icon">⊞</span><span>Início</span></button>
    <button class="nav-item" data-nav="analise" onclick="navigate('analise',this)"><span class="nav-icon">◎</span><span>Análise</span></button>
    <button class="nav-item" data-nav="config" onclick="navigate('config',this)"><span class="nav-icon">⚙</span><span>Config</span></button>
  </nav>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-grupo">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo Grupo</div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="grupo-nome" placeholder="Ex: Carros, Motas"></div>
    <div class="form-group"><label class="form-label">Descrição (opcional)</label><input class="form-input" id="grupo-desc"></div>
    <button class="btn btn-green" onclick="saveGrupo()">Guardar</button>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('modal-grupo')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-parceiro">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo Parceiro</div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="parceiro-nome" placeholder="Ex: João, Maria"></div>
    <button class="btn btn-green" onclick="saveParceiro()">Guardar</button>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('modal-parceiro')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-ativo">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo Ativo</div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="ativo-nome" placeholder="Ex: BMW 320d 2019"></div>
    <div class="form-group"><label class="form-label">Descrição (opcional)</label><input class="form-input" id="ativo-desc" placeholder="Matrícula, cor, etc."></div>
    <div class="form-group"><label class="form-label">Data de aquisição</label><input class="form-input" type="date" id="ativo-data"></div>
    <button class="btn btn-green" onclick="saveAtivo()">Guardar</button>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('modal-ativo')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-movimento">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-mov-title">Novo Movimento</div>
    <div class="tipo-toggle">
      <button class="tipo-btn active-custo" id="tipo-custo" onclick="setTipo('custo')">− Custo</button>
      <button class="tipo-btn" id="tipo-receita" onclick="setTipo('receita')">+ Receita</button>
    </div>
    <div class="form-group"><label class="form-label">Categoria</label><select class="form-select" id="mov-categoria"></select></div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Valor total (€)</label><input class="form-input" type="number" id="mov-valor" placeholder="0.00" min="0" step="0.01" inputmode="decimal" oninput="onValorChange()"></div>
      <div class="form-group"><label class="form-label">Data</label><input class="form-input" type="date" id="mov-data"></div>
    </div>
    <div class="form-group"><label class="form-label">Descrição (opcional)</label><textarea class="form-textarea" id="mov-desc"></textarea></div>

    <div class="divisao-box">
      <div class="divisao-header">
        <span class="divisao-title">Divisão do valor</span>
        <button class="btn-sm" onclick="openAddParceiro()">+ Parceiro</button>
      </div>
      <div class="proprio-row">
        <span class="proprio-label">A minha parte</span>
        <input type="number" class="proprio-input" id="mov-proprio" placeholder="0.00" min="0" step="0.01" inputmode="decimal" oninput="updateDiff()">
      </div>
      <div id="participacoes-lista"></div>
      <div class="diff-bar" id="diff-bar" style="display:none;"></div>
    </div>

    <button class="btn btn-green" onclick="saveMovimento()">Guardar</button>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('modal-movimento')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-add-parceiro">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Adicionar parceiro</div>
    <div id="lista-parceiros-sel"></div>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal('modal-add-parceiro')">Fechar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-opcoes">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Opções</div>
    <button class="btn btn-secondary" style="margin-bottom:8px;" onclick="marcarVendido()">Marcar como vendido</button>
    <button class="btn btn-secondary" style="margin-bottom:8px;" onclick="marcarEmCarteira()">Marcar em carteira</button>

const api=async(path,method='GET',body=null)=>{
  const h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+(authToken||SUPABASE_KEY),'Content-Type':'application/json'};
  if(method==='POST')h['Prefer']='return=representation';
  const opts={method,headers:h};if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
  if(!r.ok){const e=await r.json();throw new Error(e.message||'Erro API');}
  if(method==='DELETE'||r.status===204)return null;
  return r.json();
};
const authApi=async(ep,body)=>{
  const r=await fetch(SUPABASE_URL+'/auth/v1/'+ep,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
};

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();

  const data=await authApi('token?grant_type=password',{email,password:pass});

function navigate(screen,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

function onValorChange(){
  const total=parseFloat(document.getElementById('mov-valor').value)||0;
  if(movParceiros.length===0)document.getElementById('mov-proprio').value=total>0?total.toFixed(2):'';
  updateDiff();
}
function updateDiff(){
  const total=parseFloat(document.getElementById('mov-valor').value)||0;
  const proprio=parseFloat(document.getElementById('mov-proprio').value)||0;
  let soma=proprio;
  movParceiros.forEach(p=>{const inp=document.getElementById('pinp-'+p.parceiro_id);if(inp)soma+=parseFloat(inp.value)||0;});
  const diff=total-soma;
  const bar=document.getElementById('diff-bar');
  if(total===0){bar.style.display='none';return;}
  bar.style.display='block';
  if(Math.abs(diff)<0.01){bar.className='diff-bar diff-ok';bar.textContent='✓ '+fmtD(total)+' distribuídos';}
  else if(diff>0){bar.className='diff-bar diff-err';bar.textContent='Faltam '+fmtD(diff)+' por atribuir';}
  else{bar.className='diff-bar diff-err';bar.textContent='Excesso de '+fmtD(Math.abs(diff));}
}

async function renderAnalise(){
  document.getElementById('analise-content').innerHTML='<div class="loading">A calcular<span class="dot-anim"></span></div>';
  await loadAll();
  const[movAll,ativosAll]=await Promise.all([api('movimentos?select=valor,valor_proprio,tipo,data,ativos(grupo_id)'),api('ativos?select=id,estado,grupo_id')]);
  const anos={};
  movAll.forEach(m=>{
    const ano=m.data?m.data.slice(0,4):'N/A';
    if(!anos[ano])anos[ano]={custo:0,receita:0,custoP:0,receitaP:0};
    const vp=parseFloat(m.valor_proprio!=null?m.valor_proprio:m.valor);
    const vt=parseFloat(m.valor);
    if(m.tipo==='custo'){anos[ano].custo+=vt;anos[ano].custoP+=vp;}
    else{anos[ano].receita+=vt;anos[ano].receitaP+=vp;}
  });
  const porGrupo={};
  grupos.forEach(g=>{porGrupo[g.id]={nome:g.nome,custo:0,receita:0,custoP:0,receitaP:0,total:0,vendidos:0};});
  movAll.forEach(m=>{
    if(m.ativos?.grupo_id&&porGrupo[m.ativos.grupo_id]){
      const vp=parseFloat(m.valor_proprio!=null?m.valor_proprio:m.valor);
      const vt=parseFloat(m.valor);
      if(m.tipo==='custo'){porGrupo[m.ativos.grupo_id].custo+=vt;porGrupo[m.ativos.grupo_id].custoP+=vp;}
      else{porGrupo[m.ativos.grupo_id].receita+=vt;porGrupo[m.ativos.grupo_id].receitaP+=vp;}
    }
  });
  ativosAll.forEach(a=>{if(porGrupo[a.grupo_id]){porGrupo[a.grupo_id].total++;if(a.estado==='vendido')porGrupo[a.grupo_id].vendidos++;}});

  let html='<div class="section-title">Por ano</div>';
  const ao=Object.keys(anos).sort().reverse();
  if(!ao.length){html+='<div class="card"><div style="color:var(--text2);font-size:14px;">Sem dados ainda.</div></div>';}
  else{
    for(const ano of ao){
      const{custo,receita,custoP,receitaP}=anos[ano];
      const resT=receita-custo,resP=receitaP-custoP;
      html+=`<div class="card" style="margin-bottom:.75rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="font-size:16px;font-weight:600;">${ano}</span>
          <span class="resultado-badge ${resP>=0?'positivo':'negativo'}">${resP>=0?'+':''}${fmt(resP)}</span>
        </div>
        <div class="analise-row"><span class="analise-label">Custo total</span><span class="analise-val" style="color:var(--red)">${fmt(custo)}</span></div>
        <div class="analise-row"><span class="analise-label">Meu custo</span><span class="analise-val" style="color:var(--amber)">${fmt(custoP)}</span></div>
        <div class="analise-row"><span class="analise-label">Receita total</span><span class="analise-val" style="color:var(--green)">${fmt(receita)}</span></div>
        <div class="analise-row"><span class="analise-label">Minha receita</span><span class="analise-val" style="color:var(--green)">${fmt(receitaP)}</span></div>
        <div class="analise-row"><span class="analise-label">Resultado total</span><span class="analise-val" style="color:${resT>=0?'var(--green)':'var(--red)'}">${fmt(resT)}</span></div>
      </div>`;
    }
  }
  html+='<div class="section-title" style="margin-top:1rem;">Por grupo</div>';
  for(const gid of Object.keys(porGrupo)){
    const g=porGrupo[gid];const resP=g.receitaP-g.custoP;const resT=g.receita-g.custo;
    html+=`<div class="card" style="margin-bottom:.75rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:16px;font-weight:600;">${g.nome}</span>
        <span class="resultado-badge ${resP>=0?'positivo':'negativo'}">${resP>=0?'+':''}${fmt(resP)}</span>
      </div>
      <div class="analise-row"><span class="analise-label">Ativos totais</span><span class="analise-val">${g.total}</span></div>
      <div class="analise-row"><span class="analise-label">Vendidos</span><span class="analise-val">${g.vendidos}</span></div>
      <div class="analise-row"><span class="analise-label">Meu custo</span><span class="analise-val" style="color:var(--amber)">${fmt(g.custoP)}</span></div>
      <div class="analise-row"><span class="analise-label">Minha receita</span><span class="analise-val" style="color:var(--green)">${fmt(g.receitaP)}</span></div>
      <div class="analise-row"><span class="analise-label">Resultado total</span><span class="analise-val" style="color:${resT>=0?'var(--green)':'var(--red)'}">${fmt(resT)}</span></div>
    </div>`;
  }
  document.getElementById('analise-content').innerHTML=html;
}

// CONFIG
async function renderConfig(){
  await loadAll();
  document.getElementById('config-grupos').innerHTML=grupos.length?grupos.map(g=>`<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center;cursor:default;"><span style="font-size:14px;">${g.nome}</span></div>`).join(''):'<div style="color:var(--text2);font-size:13px;margin-bottom:.5rem;">Nenhum grupo criado</div>';
  document.getElementById('config-parceiros').innerHTML=parceiros.length?parceiros.map(p=>`<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center;cursor:default;"><span style="font-size:14px;">${p.nome}</span></div>`).join(''):'<div style="color:var(--text2);font-size:13px;margin-bottom:.5rem;">Nenhum parceiro criado</div>';
  document.getElementById('config-categorias').innerHTML=categorias.map(c=>`<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center;cursor:default;"><span style="font-size:14px;">${c.nome}</span><span style="font-size:11px;padding:3px 8px;border-radius:20px;background:${c.tipo==='custo'?'var(--red-bg)':'var(--green-bg)'};color:${c.tipo==='custo'?'var(--red)':'var(--green)'};">${c.tipo}</span></div>`).join('');
}

// GRUPO CRUD
function openModalNovoGrupo(){document.getElementById('grupo-nome').value='';document.getElementById('grupo-desc').value='';openModal('modal-grupo');}
async function saveGrupo(){
  const nome=document.getElementById('grupo-nome').value.trim();
  if(!nome){toast('Indica o nome do grupo');return;}
  try{await api('grupos','POST',{nome,descricao:document.getElementById('grupo-desc').value.trim()});closeModal('modal-grupo');toast('Grupo criado!');await loadAll();renderConfig();renderDashboard();}
  catch(e){toast('Erro: '+e.message);}
}

// PARCEIRO CRUD
function openModalNovoParceiro(){document.getElementById('parceiro-nome').value='';openModal('modal-parceiro');}
async function saveParceiro(){
  const nome=document.getElementById('parceiro-nome').value.trim();
  if(!nome){toast('Indica o nome do parceiro');return;}
  try{await api('parceiros','POST',{nome});closeModal('modal-parceiro');toast('Parceiro criado!');await loadAll();renderConfig();}
  catch(e){toast('Erro: '+e.message);}
}

// ATIVO CRUD
function openModalNovoAtivo(){document.getElementById('ativo-nome').value='';document.getElementById('ativo-desc').value='';document.getElementById('ativo-data').value=today();openModal('modal-ativo');}
async function saveAtivo(){
  const nome=document.getElementById('ativo-nome').value.trim();
  if(!nome){toast('Indica o nome do ativo');return;}
  try{await api('ativos','POST',{grupo_id:currentGrupoId,nome,descricao:document.getElementById('ativo-desc').value.trim(),data_aquisicao:document.getElementById('ativo-data').value||null});closeModal('modal-ativo');toast('Ativo criado!');await renderAtivos();}
  catch(e){toast('Erro: '+e.message);}
}
async function marcarVendido(){closeModal('modal-opcoes');try{await api('ativos?id=eq.'+currentAtivoId,'PATCH',{estado:'vendido',data_venda:today()});toast('Marcado como vendido');await loadAtivos(currentGrupoId);await renderAtivo();}catch(e){toast('Erro: '+e.message);}}
async function marcarEmCarteira(){closeModal('modal-opcoes');try{await api('ativos?id=eq.'+currentAtivoId,'PATCH',{estado:'em_carteira',data_venda:null});toast('Marcado em carteira');await loadAtivos(currentGrupoId);await renderAtivo();}catch(e){toast('Erro: '+e.message);}}
async function eliminarAtivo(){
  if(!confirm('Eliminar este ativo e todos os seus movimentos?'))return;
  closeModal('modal-opcoes');
  try{
    const movIds=await api('movimentos?ativo_id=eq.'+currentAtivoId+'&select=id');
    for(const m of movIds)await api('movimento_parceiros?movimento_id=eq.'+m.id,'DELETE');
    await api('movimentos?ativo_id=eq.'+currentAtivoId,'DELETE');
    await api('ativos?id=eq.'+currentAtivoId,'DELETE');
    toast('Ativo eliminado');goBack();await renderAtivos();
  }catch(e){toast('Erro: '+e.message);}
}

// MOVIMENTO CRUD
function setTipo(tipo){
  movTipo=tipo;
  document.getElementById('tipo-custo').className='tipo-btn'+(tipo==='custo'?' active-custo':'');
  document.getElementById('tipo-receita').className='tipo-btn'+(tipo==='receita'?' active-receita':'');
  populateCategorias(tipo);
}
function populateCategorias(tipo){
  const sel=document.getElementById('mov-categoria');sel.innerHTML='';
  categorias.filter(c=>c.tipo===tipo).forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome;sel.appendChild(o);});
}
function openModalMovimento(tipo){
  movTipo=tipo;movParceiros=[];
  setTipo(tipo);
  document.getElementById('mov-valor').value='';
  document.getElementById('mov-proprio').value='';
  document.getElementById('mov-data').value=today();
  document.getElementById('mov-desc').value='';
  document.getElementById('participacoes-lista').innerHTML='';
  document.getElementById('diff-bar').style.display='none';
  document.getElementById('modal-mov-title').textContent=tipo==='custo'?'Registar Custo':'Registar Receita';
  openModal('modal-movimento');
}
async function saveMovimento(){
  const valor=parseFloat(document.getElementById('mov-valor').value);
  const proprio=parseFloat(document.getElementById('mov-proprio').value);
  const catId=document.getElementById('mov-categoria').value;
  const data=document.getElementById('mov-data').value;
  if(!valor||valor<=0){toast('Indica um valor válido');return;}
  if(isNaN(proprio)||proprio<0){toast('Indica a tua parte');return;}
  if(!catId){toast('Seleciona uma categoria');return;}
  if(!data){toast('Indica a data');return;}

  // verificar soma
  let soma=proprio;
  const partsData=[];
  for(const p of movParceiros){
    const inp=document.getElementById('pinp-'+p.parceiro_id);
    const v=parseFloat(inp?inp.value:0)||0;
    if(v<=0){toast('Indica o valor de '+p.nome);return;}
    soma+=v;partsData.push({parceiro_id:p.parceiro_id,valor:v});
  }
  if(Math.abs(soma-valor)>0.01){toast('A soma das partes ('+fmtD(soma)+') não coincide com o total ('+fmtD(valor)+')');return;}

  try{
    const[mov]=await api('movimentos','POST',{ativo_id:currentAtivoId,categoria_id:parseInt(catId),tipo:movTipo,valor,valor_proprio:proprio,data,descricao:document.getElementById('mov-desc').value.trim()||null});
    for(const p of partsData)await api('movimento_parceiros','POST',{movimento_id:mov.id,parceiro_id:p.parceiro_id,valor:p.valor});
    closeModal('modal-movimento');toast('Guardado!');await renderAtivo();
  }catch(e){toast('Erro: '+e.message);}
}
async function deleteMovimento(id){
  if(!confirm('Eliminar este movimento?'))return;
  try{await api('movimento_parceiros?movimento_id=eq.'+id,'DELETE');await api('movimentos?id=eq.'+id,'DELETE');toast('Eliminado');await renderAtivo();}
  catch(e){toast('Erro: '+e.message);}
}

// CATEGORIA CRUD
function setCatTipo(tipo){catTipo=tipo;document.getElementById('cat-tipo-custo').className='tipo-btn'+(tipo==='custo'?' active-custo':'');document.getElementById('cat-tipo-receita').className='tipo-btn'+(tipo==='receita'?' active-receita':'');}
function openModalNovaCategoria(){document.getElementById('cat-nome').value='';catTipo='custo';document.getElementById('cat-tipo-custo').className='tipo-btn active-custo';document.getElementById('cat-tipo-receita').className='tipo-btn';openModal('modal-categoria');}
async function saveCategoria(){
  const nome=document.getElementById('cat-nome').value.trim();
  if(!nome){toast('Indica o nome');return;}
  try{await api('categorias','POST',{nome,tipo:catTipo});closeModal('modal-categoria');toast('Categoria criada!');await loadAll();renderConfig();}
  catch(e){toast('Erro: '+e.message);}
}
